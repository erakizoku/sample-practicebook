<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>サンプル問題集</title><link rel="stylesheet" href="./styles.css"></head><body><main class="app-shell"><section class="screen is-active" id="homeScreen"><div class="brand"><div class="logo-mark">Q</div><div><p class="eyebrow">Practice Book</p><h1 id="appTitle">サンプル問題集</h1></div></div><div class="home-menu"><div class="category-list" id="categoryList"></div></div><button class="ghost-button reset-history-button" id="resetHistoryButton">この端末の履歴を消す</button><p class="status-text" id="loadStatus">データを読み込み中...</p></section><section class="screen" id="quizScreen"><header class="top-bar"><button class="icon-button" id="quitQuizButton" aria-label="戻る">‹</button><div><p class="eyebrow" id="quizCategoryName">Quiz</p><h2><span id="currentIndex">1</span>/<span id="questionTotal">1</span></h2></div></header><div class="progress-track"><div id="progressFill"></div></div><article class="question-panel"><p class="question-number" id="questionNumber"></p><h3 id="questionText"></h3><p class="hint-text" id="answerHint"></p><div class="answer-list" id="answerList"></div></article><div class="feedback is-hidden" id="feedbackBox"><strong id="feedbackTitle"></strong><p id="feedbackBody"></p></div><div class="quiz-actions"><button class="primary-button" id="submitAnswerButton">回答する</button><button class="primary-button is-hidden" id="nextQuestionButton">次へ</button></div></section><section class="screen" id="resultScreen"><header class="top-bar"><button class="icon-button" data-go="homeScreen" aria-label="戻る">‹</button><div><p class="eyebrow">Result</p><h2>結果</h2></div></header><div class="result-card" id="resultCard"><p class="result-label" id="passLabel"></p><strong id="scoreText"></strong><span id="resultMessage"></span></div><div class="result-actions"><button class="primary-button" id="retryButton">もう一度解く</button><button class="ghost-button" data-go="homeScreen">メニューへ</button></div><div class="review-list" id="reviewList"></div></section></main><script src="./config.js"></script><script src="./app.js"></script></body></html>
